openapi: 3.0.3
info:
  title: Notifications service
  version: v0
servers:
  - url: http://217.29.121.129/notification_api
    description: Generated server url
security:
  - basicAuth: [ ]
paths:
  /notifications/sending:
    post:
      tags:
        - notification-controller
      operationId: sending
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSendRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/CommonResponseNotificationSendResponse"
  /notifications/registration:
    post:
      tags:
        - registration-controller
      operationId: registration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/CommonResponseRegistrationResponse"
  /notifications:
    get:
      tags:
        - notification-controller
      operationId: list
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/PageNotificationResponse"
components:
  schemas:
    NotificationSendRequest:
      type: object
      properties:
        receiver:
          $ref: "#/components/schemas/ReceiverDto"
        type:
          type: string
          enum:
            - SMS
            - EMAIL
            - PUSH
        text:
          type: string
          minLength: 1
      required:
        - text
        - type
    ReceiverDto:
      type: object
      properties:
        phone:
          type: string
        email:
          type: string
        firebaseToken:
          type: string
    CommonResponseNotificationSendResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/NotificationSendResponse"
    NotificationSendResponse:
      type: object
      properties:
        notificationId:
          type: integer
          format: int64
    RegistrationRequest:
      type: object
      properties:
        taxNumber:
          type: string
          maxLength: 9
          minLength: 9
        companyName:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        login:
          type: string
          minLength: 1
        webhook:
          type: string
          minLength: 1
      required:
        - companyName
        - email
        - login
        - taxNumber
        - webhook
    CommonResponseRegistrationResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/RegistrationResponse"
    RegistrationResponse:
      type: object
      properties:
        merchantId:
          type: integer
          format: int64
        password:
          type: string
    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        text:
          type: string
        type:
          type: string
          enum:
            - SMS
            - EMAIL
            - PUSH
        status:
          type: string
          enum:
            - CREATED
            - SENT
            - FAILED
        receiverInfo:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PageNotificationResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/NotificationResponse"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
