var spec = "$rootDir/specs/NotificationService.yaml"
var generatedSourcesDir = layout.buildDirectory.dir('generated').get().asFile.absolutePath

openApiGenerate {
    def base = "uz.uzumtech.common.client.notifications"

    generatorName = "spring"
    inputSpec = spec
    outputDir = generatedSourcesDir
    apiPackage = "${base}.api"
    modelPackage = "${base}.dto"
    modelNameSuffix = "Dto"
    modelNamePrefix = "Ex"
    generateModelTests = false
    generateApiTests = false
    generateApiDocumentation = false

    configOptions = [
            library          : "spring-cloud",
            useResponseEntity: "false",
            interfaceOnly    : "true",
            useFeignClientUrl: "true",
            useSpringBoot3   : "true",
            generateBuilders : "true"
    ]

    ignoreFileOverride = "$rootDir/.openapi-generator-ignore"
}

compileJava.dependsOn 'openApiGenerate'

sourceSets {
    main {
        java {
            srcDir layout.buildDirectory.dir('generated/src/main/java')
        }
    }
    test {
        java {
            srcDir layout.buildDirectory.dir('generated/src/main/java')
        }
    }
}