spring:
  config:
    activate:
      on-profile: db
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  flyway:
    schemas: products
    default-schema: products
  datasource:
    url: ${SPRING_DATASOURCE_URL} # jdbc:postgresql://localhost:5432/jmarket-db?currentSchema=products
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        implicit-strategy: org.springframework.boot.hibernate.SpringImplicitNamingStrategy
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      properties:
        show_sql: true
        highlight_sql: true
        query:
          fail_on_pagination_over_collection_fetch: true
    properties:
      hibernate:
        default_schema: products